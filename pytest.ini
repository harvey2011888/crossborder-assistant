[pytest]
# 测试目录
python_files = test_*.py *_test.py
python_classes = Test*
python_functions = test_*

# 异步测试支持
asyncio_mode = auto

# 测试路径
testpaths = tests

# 覆盖率配置
addopts = 
    -v
    --tb=short
    --strict-markers
    --cov=bot
    --cov=models
    --cov=utils
    --cov-report=term-missing
    --cov-report=html:htmlcov
    --cov-report=xml:coverage.xml

# 标记定义
markers =
    unit: 单元测试
    integration: 集成测试
    slow: 慢速测试
    ai: AI服务测试
    db: 数据库测试
    discord: Discord Bot测试
